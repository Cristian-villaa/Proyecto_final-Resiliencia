apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: busybox-set
spec:
  serviceName: "busybox"
  replicas: 2
  selector:
    matchLabels:
      app: busybox
  template:
    metadata:
      labels:
        app: busybox
    spec:
      containers:
        - name: busybox
          image: busybox:latest
          command: ["sh", "-c", "while true; do echo Hola desde StatefulSet; sleep 10; done"]
